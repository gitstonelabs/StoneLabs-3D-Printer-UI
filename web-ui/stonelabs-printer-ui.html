document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

(--inset);color:var(--tx);font-family:'JetBrains Mono';font-size:13px;padding:0 12px;outline:none;\">\n                  <button style=\"height:46px;padding:0 20px;border-radius:11px;border:1px solid var(--b3);background:var(--control);color:var(--tx2);font-family:'Manrope';font-weight:700;font-size:14px;cursor:pointer;\" style-hover=\"border-color:var(--accentdim);color:var(--accent2);\" onclick=\"{{ applyCam }}\">Apply<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <!-- display -->\n              <div style=\"background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--b2);border-radius:14px;padding:16px;flex:1;\">\n                <div style=\"font-family:'Manrope';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--txd);margin-bottom:14px;\">Display<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;\">\n                  <span style=\"font-family:'Manrope';font-size:14px;color:var(--tx2);\">Brightness<\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono';font-size:14px;color:var(--accent2);\">{{ brightness }}%<\u002Fspan>\n                <\u002Fdiv>\n                <input type=\"range\" min=\"10\" max=\"100\" value=\"{{ brightness }}\" oninput=\"{{ setBrightness }}\" style=\"width:100%;accent-color:var(--accent);height:6px;\">\n                <div style=\"margin-top:16px;padding-top:14px;border-top:1px solid var(--b1);\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n                    <span style=\"font-family:'Manrope';font-size:14px;color:var(--tx2);\">Theme<\u002Fspan>\n                    <div style=\"display:flex;gap:4px;padding:3px;background:var(--inset);border:1px solid var(--b1);border-radius:9px;\">\n                      <button style=\"{{ modeDarkBtn }}\" onclick=\"{{ setDark }}\">Dark<\u002Fbutton>\n                      <button style=\"{{ modeLightBtn }}\" onclick=\"{{ setLight }}\">Light<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n                    <sc-for list=\"{{ themeSwatches }}\" as=\"th\" hint-placeholder-count=\"6\">\n                      <button style=\"{{ th.style }}\" onclick=\"{{ th.on }}\" title=\"{{ th.name }}\">\n                        <span style=\"width:22px;height:22px;border-radius:50%;background:{{ th.swatch }};box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);\"><\u002Fspan>\n                      <\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"width:300px;flex:none;display:flex;flex-direction:column;gap:14px;\">\n              <div style=\"background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--b2);border-radius:14px;padding:16px;\">\n                <div style=\"font-family:'Manrope';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--txd);margin-bottom:12px;\">System<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:8px;font-family:'JetBrains Mono';font-size:13px;\">\n                  <div style=\"display:flex;justify-content:space-between;gap:8px;\"><span style=\"color:var(--txd);\">host<\u002Fspan><span style=\"color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ sysHost }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;justify-content:space-between;gap:8px;\"><span style=\"color:var(--txd);\">klipper<\u002Fspan><span style=\"color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ sysKlipper }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;justify-content:space-between;\"><span style=\"color:var(--txd);\">state<\u002Fspan><span style=\"color:{{ sysStateColor }};\">{{ sysState }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;justify-content:space-between;\"><span style=\"color:var(--txd);\">ui<\u002Fspan><span style=\"color:var(--accent);\">{{ uiVersion }}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:8px;margin-top:14px;\">\n                  <button style=\"flex:1;height:42px;border-radius:10px;border:1px solid var(--b3);background:var(--control);color:var(--tx2);font-family:'Manrope';font-weight:700;font-size:13px;cursor:pointer;\" style-hover=\"border-color:var(--accentdim);color:var(--accent2);\" onclick=\"{{ restartKlipper }}\">FW Restart<\u002Fbutton>\n                  <button style=\"flex:1;height:42px;border-radius:10px;border:1px solid var(--danger-b);background:var(--danger-d2);color:var(--danger);font-family:'Manrope';font-weight:700;font-size:13px;cursor:pointer;\" style-hover=\"box-shadow:0 0 0 1px rgba(var(--danger-rgb),.4);\" onclick=\"{{ shutdown }}\">Shutdown<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ demoMode }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"background:var(--inset);border:1px dashed var(--b3);border-radius:14px;padding:16px;flex:1;\">\n                <div style=\"font-family:'Manrope';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--txf);margin-bottom:6px;\">Demo levers<\u002Fdiv>\n                <div style=\"font-family:'Manrope';font-size:12px;color:var(--txd);margin-bottom:14px;\">Not connected — these simulate state. Connect to Moonraker for live data.<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\">\n                  <span style=\"font-family:'Manrope';font-size:14px;color:var(--tx2);\">Print state<\u002Fspan>\n                  <button style=\"{{ printToggle }}\" onclick=\"{{ togglePrinting }}\">{{ printToggleLabel }}<\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n                  <span style=\"font-family:'Manrope';font-size:14px;color:var(--tx2);\">CFS units online<\u002Fspan>\n                  <div style=\"display:flex;align-items:center;gap:8px;\">\n                    <button style=\"width:30px;height:30px;border-radius:8px;border:1px solid var(--b2);background:var(--control);color:var(--tx3);cursor:pointer;font-size:16px;\" onclick=\"{{ cfsMinus }}\">−<\u002Fbutton>\n                    <span style=\"font-family:'JetBrains Mono';font-size:15px;color:var(--accent2);width:12px;text-align:center;\">{{ cfsUnits }}<\u002Fspan>\n                    <button style=\"width:30px;height:30px;border-radius:8px;border:1px solid var(--b2);background:var(--control);color:var(--tx3);cursor:pointer;font-size:16px;\" onclick=\"{{ cfsPlus }}\">+<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ online }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:linear-gradient(180deg,var(--ok-d1),var(--ok-d2));border:1px solid rgba(var(--success-rgb),.4);border-radius:14px;padding:16px;flex:1;display:flex;flex-direction:column;gap:8px;\">\n                <div style=\"font-family:'Manrope';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--success);\">Live<\u002Fdiv>\n                <div style=\"font-family:'Caveat',cursive;font-weight:700;font-size:30px;color:var(--tx);line-height:1;\">connected.<\u002Fdiv>\n                <div style=\"font-family:'Manrope';font-size:12px;color:var(--txd);\">Streaming printer objects from Moonraker over WebSocket. Controls send real G-code.<\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- TOAST -->\n          <sc-if value=\"{{ toastShown }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;padding:11px 18px;border-radius:12px;background:rgba(var(--bg2-rgb),.92);border:1px solid {{ toastBorder }};box-shadow:0 12px 30px rgba(0,0,0,.6),0 0 0 1px rgba(var(--accent-rgb),.25);backdrop-filter:blur(6px);animation:slToast .2s ease;z-index:20;\">\n              <span style=\"width:7px;height:7px;border-radius:50%;background:{{ toastDot }};box-shadow:0 0 8px {{ toastDot }};\"><\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono';font-size:14px;color:var(--accentfg);\">{{ toast }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fmain>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1096,&quot;height&quot;:708}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'home',\n    printerTab: 'motion',\n    filamentTab: 'external',\n    homeView: 'status',\n    moveDist: 1,\n    extrudeLen: 10,\n    brightness: 80,\n    camUrl: '',\n    camDraft: '',\n    camErr: false,\n    maintSel: {},\n    themeId: 'cyan',\n    modeId: 'dark',\n    clock: '--:--',\n    toast: '',\n    toastKind: 'info',\n    // connection\n    conn: 'connecting',        // 'connecting' | 'online' | 'error'\n    klippy: 'unknown',\n    mkUrl: '',\n    urlDraft: '',\n    tick: 0,\n    // demo fallback\n    demoPrinting: true,\n    demoCfsUnits: 2,\n    demoTemps: { hotend: 0, bed: 0, chamber: 0, fan: 40 },\n  };\n\n  // ---- lifecycle ----\n  componentDidMount() {\n    const tick = () => {\n      const d = new Date();\n      this.setState({ clock: String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0') });\n    };\n    tick();\n    this._clk = setInterval(tick, 15000);\n\n    this.snap = {};\n    this.objMap = {};\n    this.info = {};\n    this._rpcId = 0;\n    this._pending = {};\n    this._backoff = 1000;\n\n    let saved = '';\n    try { saved = localStorage.getItem('sl_mk_url') || ''; } catch (e) {}\n    try { const b = localStorage.getItem('sl_brightness'); if (b) this.setState({ brightness: parseInt(b, 10) }); } catch (e) {}\n    try { const th = localStorage.getItem('sl_theme'); const md = localStorage.getItem('sl_mode'); const o = {}; if (th) o.themeId = th; if (md) o.modeId = md; if (th || md) this.setState(o); } catch (e) {}\n    let cam = ''; try { cam = localStorage.getItem('sl_cam_url') || ''; } catch (e) {}\n    const camUrl = cam || this.defaultCam();\n    this.setState({ camUrl, camDraft: camUrl });\n    const url = saved || this.defaultUrl();\n    this.setState({ mkUrl: url, urlDraft: url });\n    this.connect(url);\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._clk);\n    clearTimeout(this._tt);\n    clearTimeout(this._reconnect);\n    clearTimeout(this._renderT);\n    clearTimeout(this._openT);\n    this._intentionalClose = true;\n    try { if (this._ws) this._ws.close(); } catch (e) {}\n  }\n\n  // ---- connection ----\n  defaultUrl() {\n    const proto = (typeof location !== 'undefined' && location.protocol === 'https:') ? 'wss' : 'ws';\n    let host = 'localhost';\n    try { host = location.hostname || 'localhost'; } catch (e) {}\n    return proto + '://' + host + ':7125/websocket';\n  }\n\n  defaultCam() {\n    let proto = 'http', host = 'localhost';\n    try { proto = location.protocol === 'https:' ? 'https' : 'http'; host = location.hostname || 'localhost'; } catch (e) {}\n    return proto + '://' + host + '/webcam/?action=stream';\n  }\n\n  normalizeUrl(s) {\n    s = (s || '').trim();\n    if (!s) return this.defaultUrl();\n    if (/^wss?:\\/\\//i.test(s)) return s;\n    const proto = (typeof location !== 'undefined' && location.protocol === 'https:') ? 'wss' : 'ws';\n    let host = s, port = '7125';\n    const m = s.match(/^([^:\\/]+)(?::(\\d+))?/);\n    if (m) { host = m[1]; if (m[2]) port = m[2]; }\n    return proto + '://' + host + ':' + port + '/websocket';\n  }\n\n  connect(url) {\n    clearTimeout(this._reconnect);\n    try { if (this._ws) { this._intentionalClose = true; this._ws.close(); } } catch (e) {}\n    this._intentionalClose = false;\n    this.setState({ conn: 'connecting' });\n    let ws;\n    try {\n      ws = new WebSocket(url);\n    } catch (e) {\n      this.scheduleReconnect();\n      return;\n    }\n    this._ws = ws;\n    clearTimeout(this._openT);\n    this._openT = setTimeout(() => {\n      if (ws.readyState !== 1) { try { this._intentionalClose = false; ws.close(); } catch (e) {} }\n    }, 5000);\n    ws.onopen = () => { clearTimeout(this._openT); this._backoff = 1000; this.afterOpen(); };\n    ws.onmessage = (ev) => this.onMessage(ev);\n    ws.onerror = () => {};\n    ws.onclose = () => {\n      clearTimeout(this._openT);\n      this._readyOnce = false;\n      if (this._intentionalClose) return;\n      this.setState({ conn: 'error', klippy: 'disconnected' });\n      this.scheduleReconnect();\n    };\n  }\n\n  scheduleReconnect() {\n    clearTimeout(this._reconnect);\n    const wait = Math.min(this._backoff, 8000);\n    this._backoff = Math.min(this._backoff * 1.6, 8000);\n    this._reconnect = setTimeout(() => this.connect(this.state.mkUrl), wait);\n  }\n\n  rpc(method, params) {\n    return new Promise((resolve, reject) => {\n      if (!this._ws || this._ws.readyState !== 1) { reject(new Error('socket not open')); return; }\n      const id = ++this._rpcId;\n      this._pending[id] = { resolve, reject };\n      try {\n        this._ws.send(JSON.stringify({ jsonrpc: '2.0', method, params: params || {}, id }));\n      } catch (e) { delete this._pending[id]; reject(e); return; }\n      setTimeout(() => {\n        if (this._pending[id]) { delete this._pending[id]; reject(new Error('timeout')); }\n      }, 10000);\n    });\n  }\n\n  async afterOpen() {\n    this.rpc('server.connection.identify', {\n      client_name: 'StoneLabs Printer UI', version: '1.0', type: 'display', url: 'https://stonelabs.local',\n    }).catch(() => {});\n    await this.subscribeAll();\n  }\n\n  async subscribeAll() {\n    try {\n      const info = await this.rpc('printer.info');\n      if (info) { this.info = info; this.setState({ klippy: info.state || 'ready' }); }\n    } catch (e) {\n      // klippy not ready yet — wait for notify_klippy_ready\n      this.setState({ conn: 'error' });\n      return;\n    }\n    let list;\n    try {\n      const r = await this.rpc('printer.objects.list');\n      list = (r && r.objects) || [];\n    } catch (e) { this.scheduleReconnect(); return; }\n\n    const has = (x) => list.indexOf(x) !== -1;\n    const sensors = [];\n    const heaters = [];\n    this.objMap = {};\n    list.forEach((o) => {\n      if (o.indexOf('temperature_sensor ') === 0) {\n        const nm = o.slice(19).toLowerCase();\n        if (/cham/.test(nm)) this.objMap.chamber = o;\n        else if (/mcu|tool|board|ebb|can|host|pi|rasp|soc|cb/.test(nm)) { if (!this.objMap.mcu) this.objMap.mcu = o; }\n        sensors.push(o);\n      } else if (o.indexOf('heater_generic ') === 0) {\n        const nm = o.slice(15).toLowerCase();\n        if (/cham/.test(nm)) this.objMap.chamberHeater = o;\n        heaters.push(o);\n      }\n    });\n\n    const sub = {\n      webhooks: ['state', 'state_message'],\n      print_stats: ['state', 'filename', 'print_duration', 'total_duration', 'filament_used', 'info', 'message'],\n      virtual_sdcard: ['progress', 'is_active'],\n      display_status: ['progress', 'message'],\n      gcode_move: ['gcode_position', 'homing_origin', 'speed_factor', 'extrude_factor'],\n      toolhead: ['position', 'homed_axes', 'axis_minimum', 'axis_maximum', 'extruder'],\n      idle_timeout: ['state'],\n    };\n    if (has('pause_resume')) sub.pause_resume = ['is_paused'];\n    if (has('extruder')) sub.extruder = ['temperature', 'target', 'power'];\n    if (has('heater_bed')) sub.heater_bed = ['temperature', 'target', 'power'];\n    if (has('fan')) sub.fan = ['speed'];\n    if (has('save_variables')) sub.save_variables = null;\n    sensors.forEach((s) => { sub[s] = ['temperature']; });\n    heaters.forEach((h) => { sub[h] = ['temperature', 'target']; });\n\n    try {\n      const res = await this.rpc('printer.objects.subscribe', { objects: sub });\n      if (res && res.status) this.mergeStatus(res.status);\n      this._readyOnce = true;\n      this.setState({ conn: 'online' });\n      this.scheduleRender();\n    } catch (e) { this.scheduleReconnect(); }\n  }\n\n  onMessage(ev) {\n    let m;\n    try { m = JSON.parse(ev.data); } catch (e) { return; }\n    if (m.id && this._pending[m.id]) {\n      const p = this._pending[m.id];\n      delete this._pending[m.id];\n      if (m.error) p.reject(new Error(m.error.message || 'rpc error'));\n      else p.resolve(m.result);\n      return;\n    }\n    if (!m.method) return;\n    if (m.method === 'notify_status_update') {\n      if (m.params && m.params[0]) { this.mergeStatus(m.params[0]); this.scheduleRender(); }\n    } else if (m.method === 'notify_gcode_response') {\n      const txt = m.params && m.params[0];\n      if (txt && (txt.indexOf('!!') === 0 || /error/i.test(txt))) this.flash(txt.replace(/^[/!]+\\s*/, ''), 'error');\n    } else if (m.method === 'notify_klippy_ready') {\n      this.setState({ klippy: 'ready' });\n      this.subscribeAll();\n    } else if (m.method === 'notify_klippy_disconnected' || m.method === 'notify_klippy_shutdown') {\n      this.setState({ klippy: m.method === 'notify_klippy_shutdown' ? 'shutdown' : 'disconnected', conn: 'error' });\n    }\n  }\n\n  mergeStatus(status) {\n    for (const k in status) {\n      const v = status[k];\n      if (v && typeof v === 'object' && !Array.isArray(v)) {\n        this.snap[k] = Object.assign({}, this.snap[k] || {}, v);\n 'M106 S' + Math.round(p / 100 * 255), 'fan → ' + p + '%'); if (!online) set({ demoTemps: Object.assign({}, S.demoTemps, { fan: p }) }); };\n\n    const presetRow = (cur, opts, fn) => opts.map(([label, val]) => ({ label, style: this.seg(cur === val), on: () => fn(val) }));\n    const tgtTxt = (v) => v ? ' → ' + v + '°' : '';\n    const tempCards = [\n      { label: 'Hotend', color: 'var(--ember)', current: P.hotendCur == null ? '—' : P.hotendCur, unit: '°C', tgt: tgtTxt(P.hotendTgt), presets: presetRow(P.hotendTgt, [['Off', 0], ['PLA 200', 200], ['PETG 240', 240]], setHotend) },\n      { label: 'Bed', color: 'var(--accent2)', current: P.bedCur == null ? '—' : P.bedCur, unit: '°C', tgt: tgtTxt(P.bedTgt), presets: presetRow(P.bedTgt, [['Off', 0], ['60°', 60], ['90°', 90]], setBed) },\n      { label: 'Chamber', color: 'var(--accent)', current: P.chamberCur == null ? '—' : P.chamberCur, unit: '°C', tgt: tgtTxt(P.chamberTgt), presets: presetRow(P.chamberTgt, [['Off', 0], ['40°', 40], ['60°', 60]], setChamber) },\n      { label: 'Part fan', color: 'var(--tx3)', current: P.fanPct, unit: '%', tgt: '', presets: presetRow(P.fanPct, [['0%', 0], ['50%', 50], ['100%', 100]], setFan) },\n    ];\n\n    // ---- extrude ----\n    const elens = [1, 5, 10, 50];\n    const extrudeOpts = elens.map((l) => ({ label: String(l), style: this.seg(S.extrudeLen === l), on: () => set({ extrudeLen: l }) }));\n    const hot = (P.hotendCur != null && P.hotendCur >= 170);\n    const extruder = hot\n      ? { guardLabel: 'ready · ' + P.hotendCur + '°', guardBorder: 'rgba(var(--success-rgb),.4)', guardBg: 'rgba(var(--success-rgb),.1)', guardDot: 'var(--success)', guardText: 'var(--success)' }\n      : { guardLabel: 'cold · heat first', guardBorder: 'rgba(var(--warning-rgb),.4)', guardBg: 'rgba(var(--warning-rgb),.1)', guardDot: 'var(--warning)', guardText: 'var(--warning)' };\n    const doExtrudeFn = (sign) => {\n      if (online && !hot) { this.flash('hotend cold — heat to 170°+ first', 'error'); return; }\n      this.gcode('M83\\nG1 E' + (sign * S.extrudeLen) + ' F300', (sign > 0 ? 'extrude ' : 'retract ') + S.extrudeLen + 'mm');\n    };\n\n    // ---- filament tabs ----\n    const cfs = this.cfsModel();\n    const tabs = [{ id: 'external', label: 'External', dot: 'var(--accent)' }];\n    for (let i = 0; i < cfs.count; i++) tabs.push({ id: 'cfs' + i, label: 'CFS ' + (i + 1), dot: 'var(--accent2)' });\n    const effTab = tabs.find((x) => x.id === S.filamentTab) ? S.filamentTab : 'external';\n    const filTabs = tabs.map((x) => ({ label: x.label, dot: x.dot, style: this.seg(effTab === x.id), on: () => set({ filamentTab: x.id }) }));\n    const isExternalTab = effTab === 'external';\n    const isCfsTab = !isExternalTab;\n    const ext = Object.assign({}, cfs.ext, { glow: 'rgba(120,130,150,.5)' });\n\n    let cfsSlots = [];\n    if (isCfsTab) {\n      const idx = parseInt(effTab.replace('cfs', ''), 10) || 0;\n      cfsSlots = cfs.slots(idx).map((sl) => {\n        const card = this.slotCard(sl);\n        const empty = sl.empty;\n        const unit = idx + 1, slot = sl.num;\n        card.on = empty ? (() => {}) : (() => {\n          if (sl.loaded) this.gcode('CFS_UNLOAD', 'unloading ' + (sl.name || 'slot ' + slot));\n          else this.gcode('CFS_LOAD UNIT=' + unit + ' SLOT=' + slot, 'loading ' + (sl.name || 'slot ' + slot) + ' · u' + unit + 's' + slot);\n        });\n        return card;\n      });\n    }\n\n    // ---- macros ----\n    const ic = {\n      level: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"14\" width=\"18\" height=\"6\" rx=\"1\"/><path d=\"M6 14V9M12 14V6M18 14v-3\"/><circle cx=\"6\" cy=\"6.5\" r=\"1.4\"/><circle cx=\"12\" cy=\"4\" r=\"1.4\"/><circle cx=\"18\" cy=\"9\" r=\"1.4\"/><\u002Fsvg>',\n      shaper: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2 12h3l2-7 4 14 3-9 2 5 2-3h4\"/><\u002Fsvg>',\n      cut: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"6\" cy=\"6\" r=\"3\"/><circle cx=\"6\" cy=\"18\" r=\"3\"/><path d=\"M8.5 8 20 18M8.5 16 20 6\"/><\u002Fsvg>',\n      zoffset: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v14\"/><path d=\"m7 12 5 5 5-5\"/><path d=\"M5 21h14\"/><\u002Fsvg>',\n      pid: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 14.8V5a2 2 0 1 0-4 0v9.8a4 4 0 1 0 4 0Z\"/><path d=\"M12 9v6\"/><\u002Fsvg>',\n      clean: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 21s1-3 4-3 4 2 6 2 4-2 4-2\"/><path d=\"M14 3 6 11l3 3 8-8z\"/><path d=\"m12 5 3 3\"/><\u002Fsvg>',\n    };\n    // Order matters: \"Run selected\" runs these top-to-bottom, so a full run\n    // builds on itself — stable temp, clean tip, then anything that touches the\n    // bed (prtouch is a nozzle-contact probe), then temp-independent tests last.\n    const maintDefs = [\n      { id: 'pid', title: 'PID tune', sub: 'hotend control', icon: ic.pid, script: 'PID_CALIBRATE HEATER=extruder TARGET=200' },\n      { id: 'clean', title: 'Clean nozzle', sub: 'wipe while hot', icon: ic.clean, script: 'CLEAN_NOZZLE' },\n      { id: 'z', title: 'Z calibrate', sub: 'nozzle-to-bed ref', icon: ic.zoffset, script: 'PROBE_CALIBRATE' },\n      { id: 'level', title: 'Auto bed level', sub: 'home + full mesh', icon: ic.level, script: 'G28\\nBED_MESH_CALIBRATE' },\n      { id: 'shaper', title: 'Input shaper', sub: 'X/Y resonance', icon: ic.shaper, script: 'SHAPER_CALIBRATE' },\n      { id: 'cut', title: 'Filament cut', sub: 'cutter calibration', icon: ic.cut, script: 'FILAMENT_CUT_CALIBRATION' },\n    ];\n    const sel = S.maintSel || {};\n    const macros = maintDefs.map((d) => {\n      const on = !!sel[d.id];\n      return {\n        title: d.title, sub: d.sub, icon: { __html: d.icon }, selected: on,\n        iconColor: on ? 'var(--accent2)' : 'var(--accent)',\n        checkStroke: on ? 'var(--bg)' : 'transparent',\n        cardStyle: 'background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid ' + (on ? 'var(--accent)' : 'var(--b2)') + ';border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;align-items:flex-start;gap:8px;cursor:pointer;text-align:left;' + (on ? 'box-shadow:inset 0 0 0 1px var(--accent),0 0 20px -6px rgba(var(--accent-rgb),.6);' : ''),\n        checkStyle: 'width:24px;height:24px;flex:none;border-radius:7px;display:flex;align-items:center;justify-content:center;background:' + (on ? 'var(--accent)' : 'transparent') + ';border:1px solid ' + (on ? 'var(--accent)' : 'var(--b3)') + ';',\n        on: () => this.setState((st) => {\n          const m = Object.assign({}, st.maintSel);\n          if (m[d.id]) delete m[d.id]; else m[d.id] = true;\n          return { maintSel: m };\n        }),\n      };\n    });\n    const selDefs = maintDefs.filter((d) => sel[d.id]);\n    const nSel = selDefs.length;\n    const maintSelLabel = nSel ? (nSel + ' routine' + (nSel > 1 ? 's' : '') + ' selected — runs in order') : 'tap routines to select';\n    const maintSelColor = nSel ? 'var(--tx2)' : 'var(--txf)';\n    const runLabel = nSel ? ('Run selected · ' + nSel) : 'Run selected';\n    const runBtnStyle = 'height:44px;padding:0 22px;border-radius:11px;display:flex;align-items:center;justify-content:center;gap:9px;font-family:\\'Manrope\\';font-weight:700;font-size:15px;border:1px solid ' +\n      (nSel ? 'var(--accent)' : 'var(--b2)') + ';background:' + (nSel ? 'linear-gradient(180deg,var(--ad1),var(--ad2))' : 'var(--inset)') + ';color:' + (nSel ? 'var(--accentfg)' : 'var(--txf)') + ';cursor:' + (nSel ? 'pointer' : 'default') + ';' + (nSel ? 'box-shadow:0 0 16px -5px rgba(var(--accent-rgb),.5);' : '');\n    const clearBtnStyle = 'height:44px;padding:0 18px;border-radius:11px;font-family:\\'Manrope\\';font-weight:700;font-size:14px;cursor:pointer;border:1px solid var(--b3);background:var(--control);color:' + (nSel ? 'var(--tx3)' : 'var(--txf)') + ';';\n    const runSelected = () => {\n      if (!nSel) { this.flash('select at least one routine first'); return; }\n      const script = selDefs.map((d) => d.script).join('\\n');\n      this.gcode(script, 'running ' + nSel + ' routine' + (nSel > 1 ? 's' : '') + '…');\n    };\n    const clearSel = () => set({ maintSel: {} });\n\n    // ---- settings / system ----\n    const sysHost = (this.info && this.info.hostname) ? this.info.hostname : (online ? '—' : 'stonelabs.local');\n    const sysKlipper = (this.info && this.info.software_version) ? this.info.software_version : (online ? '—' : 'demo');\n    const sysState = online ? (S.klippy || 'ready') : 'demo';\n    const sysStateColor = sysState === 'ready' ? 'var(--success)' : (sysState === 'shutdown' || sysState === 'error' || sysState === 'disconnected') ? 'var(--danger)' : 'var(--warning)';\n\n    const printToggle = 'height:34px;padding:0 16px;border-radius:9px;font-family:\\'Manrope\\';font-weight:700;font-size:13px;cursor:pointer;border:1px solid ' +\n      (S.demoPrinting ? 'var(--accentdim)' : 'var(--b3)') + ';background:' + (S.demoPrinting ? 'var(--ad2)' : 'var(--control)') + ';color:' + (S.demoPrinting ? 'var(--accent2)' : 'var(--tx3)') + ';';\n\n    const toastDot = S.toastKind === 'error' ? 'var(--danger)' : 'var(--accent)';\n    const toastBorder = S.toastKind === 'error' ? 'var(--danger-b)' : 'var(--accentdim)';\n\n    // ---- theme picker ----\n    const themeList = [['cyan', 'Cyan', 'var(--accent)'], ['crimson', 'Crimson', '#e23b4e'], ['amber', 'Amber + Navy', '#ff8a3c'], ['mono', 'Mono', '#f5f5f5'], ['grey', 'Greyscale', '#9aa3b2'], ['sage', 'Sage', '#8ab48a']];\n    const swatchStyle = (active) => 'width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--control);transition:all .12s;border:2px solid ' + (active ? 'var(--accent)' : 'var(--b2)') + ';' + (active ? 'box-shadow:0 0 0 2px rgba(var(--accent-rgb),.3);' : '');\n    const themeSwatches = themeList.map(([id, name, sw]) => ({ id, name, swatch: id === S.themeId ? 'var(--accent)' : sw, style: swatchStyle(S.themeId === id), on: () => { set({ themeId: id }); try { localStorage.setItem('sl_theme', id); } catch (e) {} } }));\n    const modeBtn = (active) => 'height:26px;padding:0 13px;border-radius:7px;font-family:\\'Manrope\\';font-weight:700;font-size:12px;cursor:pointer;border:none;background:' + (active ? 'var(--ad1)' : 'transparent') + ';color:' + (active ? 'var(--accent2)' : 'var(--txd)') + ';';\n\n    // ---- home camera ----\n    const segSm = (active) => 'height:32px;padding:0 18px;border-radius:9px;font-family:\\'Manrope\\';font-weight:700;font-size:13px;cursor:pointer;border:1px solid ' +\n      (active ? 'var(--accentdim)' : 'transparent') + ';background:' + (active ? 'linear-gradient(180deg,var(--ad1),var(--ad2))' : 'transparent') + ';color:' + (active ? 'var(--accent2)' : 'var(--txd)') + ';';\n    const homeCamera = S.homeView === 'camera';\n    const homeStatus = !homeCamera;\n    const camOk = homeCamera && !!S.camUrl && !S.camErr;\n    const camErr = homeCamera && !camOk;\n    const cameraImg = camOk ? React.createElement('img', {\n      src: S.camUrl, alt: 'camera',\n      onError: () => { if (!this.state.camErr) this.setState({ camErr: true }); },\n      style: { width: '100%', height: '100%', objectFit: 'contain', background: 'var(--bg)' },\n    }) : null;\n\n    return {\n      // header\n      titleAccent: t.a, titleMain: t.m, clock: S.clock,\n      hdrHotend: (P.hotendCur == null ? '—' : P.hotendCur + '°'), hdrChamber: (P.chamberCur == null ? '—' : P.chamberCur + '°'),\n      connLabel: cm.label, connDot: cm.dot, connText: cm.text, connBg: cm.bg, connBorder: cm.border, connAnim: cm.anim,\n      connDetail: S.mkUrl,\n      statusLabel: statusMap.label, statusText: statusMap.text, statusDot: statusMap.dot, statusBg: statusMap.bg, statusBorder: statusMap.border, statusAnim: statusMap.anim,\n      // nav + screens\n      nav,\n      isHome: S.screen === 'home', isPrinter: S.screen === 'printer', isFilament: S.screen === 'filament', isMaint: S.screen === 'maint', isSettings: S.screen === 'settings',\n      goHome: () => set({ screen: 'home' }), goPrinter: () => set({ screen: 'printer' }), goFilament: () => set({ screen: 'filament' }),\n      goMaint: () => set({ screen: 'maint' }), goSettings: () => set({ screen: 'settings' }), goFilamentBtn: () => set({ screen: 'filament' }),\n      estop: () => this.call('printer.emergency_stop', {}, '!! EMERGENCY STOP', 'error'),\n      // home\n      printing: P.printing, idle: !P.printing, printEyebrow: P.paused ? 'Paused' : 'Now printing', idleEyebrow: online ? 'Idle · machine ready' : 'Demo · not connected',\n      homeTemps, quickStatus, job,\n      homeStatus, homeCamera,\n      homeStatusBtn: segSm(homeStatus), homeCamBtn: segSm(homeCamera),\n      showStatus: () => set({ homeView: 'status' }), showCamera: () => set({ homeView: 'camera', camErr: false }),\n      camOk, camErr, cameraImg, camBed: deg(P.bedCur),\n      pauseLabel: P.paused ? 'Resume' : 'Pause',\n      pause: () => { if (P.paused) this.call('printer.print.resume', {}, 'resuming'); else this.call('printer.print.pause', {}, 'print paused'); },\n      stopPrint: () => { this.call('printer.print.cancel', {}, 'print cancelled'); if (!online) set({ demoPrinting: false }); },\n      preheat: () => this.gcode('M104 S200\\nM140 S60', 'preheating · PLA'),\n      // printer\n      printerTabs, isMotion: S.printerTab === 'motion', isTemps: S.printerTab === 'temps', isExtrude: S.printerTab === 'extrude',\n      jogBtn, homeAxBtn, heatBtn, distOpts,\n      jogYup: () => jog('Y', 1), jogYdown: () => jog('Y', -1), jogXplus: () => jog('X', 1), jogXminus: () => jog('X', -1),\n      jogZup: () => jog('Z', 1), jogZdown: () => jog('Z', -1),\n      homeXY: () => this.gcode('G28 X Y', 'homing X Y'), homeX: () => this.gcode('G28 X', 'homing X'),\n      homeY: () => this.gcode('G28 Y', 'homing Y'), homeZ: () => this.gcode('G28 Z', 'homing Z'), homeAll: () => this.gcode('G28', 'homing all axes'),\n      pos, tempCards, extrudeOpts, extruder,\n      doExtrude: () => doExtrudeFn(1), doRetract: () => doExtrudeFn(-1),\n      heatPLA: () => setHotend(200), heatPETG: () => setHotend(240), heatOff: () => setHotend(0),\n      // filament\n      filTabs, cfsUnits: cfs.count, cfsDemo: !online, cfsModeLabel: online ? 'cfs · detected' : 'demo · cfs',\n      cfsMinus: () => { if (!online) set({ demoCfsUnits: Math.max(0, S.demoCfsUnits - 1) }); },\n      cfsPlus: () => { if (!online) set({ demoCfsUnits: Math.min(4, S.demoCfsUnits + 1) }); },\n      isExternalTab, isCfsTab, ext, cfsSlots,\n      loadExt: () => this.gcode('CFS_LOAD_EXTERNAL', 'loading external spool'),\n      unloadExt: () => this.gcode('CFS_UNLOAD_EXTERNAL', 'unloading external spool'),\n      // maint\n      macros, maintSelLabel, maintSelColor, runLabel, runBtnStyle, clearBtnStyle, runSelected, clearSel,\n      // settings\n      brightness: S.brightness, online, demoMode: !online,\n      themeId: S.themeId, modeId: S.modeId, themeSwatches,\n      modeDarkBtn: modeBtn(S.modeId === 'dark'), modeLightBtn: modeBtn(S.modeId === 'light'),\n      setDark: () => { set({ modeId: 'dark' }); try { localStorage.setItem('sl_mode', 'dark'); } catch (e) {} },\n      setLight: () => { set({ modeId: 'light' }); try { localStorage.setItem('sl_mode', 'light'); } catch (e) {} },\n      urlValue: S.urlDraft, onUrlInput: (e) => set({ urlDraft: e.target.value }),\n      camUrlValue: S.camDraft, onCamInput: (e) => set({ camDraft: e.target.value }),\n      applyCam: () => { const u = (S.camDraft || '').trim(); try { localStorage.setItem('sl_cam_url', u); } catch (er) {} set({ camUrl: u, camErr: false }); this.flash('camera updated'); },\n      doConnect: () => {\n        const u = this.normalizeUrl(S.urlDraft);\n        try { localStorage.setItem('sl_mk_url', u); } catch (e) {}\n        set({ mkUrl: u, urlDraft: u });\n        this._backoff = 1000;\n        this.flash('connecting to ' + u);\n        this.connect(u);\n      },\n      sysHost, sysKlipper, sysState, sysStateColor, uiVersion: 'StoneLabs UI v1.1.0',\n      restartKlipper: () => this.call('printer.firmware_restart', {}, 'firmware restart…'),\n      shutdown: () => this.call('machine.shutdown', {}, 'shutting down…'),\n      setBrightness: (e) => { const b = parseInt(e.target.value, 10); set({ brightness: b }); try { localStorage.setItem('sl_brightness', String(b)); } catch (er) {} },\n      printToggle, printToggleLabel: S.demoPrinting ? 'Printing' : 'Idle', togglePrinting: () => set({ demoPrinting: !S.demoPrinting }),\n      // toast\n      toast: S.toast, toastShown: !!S.toast, toastDot, toastBorder,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"web-ui/src/build-deploy.dc"}
