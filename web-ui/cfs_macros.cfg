# ============================================================
#  StoneLabs CFS. Klipper save_variables + example macros
#  Include from printer.cfg:   [include cfs_macros.cfg]
#
#  These macros + [save_variables] back the StoneLabs Printer UI's CFS and
#  maintenance controls. The UI is 100% data-driven from the variables below.
#  Set them from your real CFS detection / load / unload logic.
# ============================================================

[save_variables]
filename: ~/printer_data/config/cfs_variables.cfg

# ------------------------------------------------------------
#  Variable reference (what the panel reads)
# ------------------------------------------------------------
#  cfs_units            int   CFS boxes online (0-4) -> number of CFS tabs
#  cfs_active_unit      int   loaded unit (0 = external spool)
#  cfs_active_slot      int   loaded slot (1-4)
#
#  per slot, unit u (0 = external, 1..4 = boxes), slot s (1..4):
#    cfs{u}_slot{s}_name       str   "" = empty slot
#    cfs{u}_slot{s}_material   str   PLA / PETG / ABS ...
#    cfs{u}_slot{s}_color      str   hex without # (e.g. 2bcdf2)
#    cfs{u}_slot{s}_remaining  int   0-100 percent
#
#  NOTE on quoting: string values must be saved quoted, e.g.
#    SAVE_VARIABLE VARIABLE=cfs1_slot1_name VALUE='"StoneLabs Cyan"'
#  numbers are bare:
#    SAVE_VARIABLE VARIABLE=cfs_units VALUE=2
# ------------------------------------------------------------


# === Replace the body of these with your real CFS control =====

[gcode_macro CFS_LOAD]
description: Load a CFS slot (UNIT, SLOT)
gcode:
    {% set unit = params.UNIT|default(1)|int %}
    {% set slot = params.SLOT|default(1)|int %}
    RESPOND MSG="CFS: loading unit {unit} slot {slot}"
    # ---- your CFS load sequence here ----
    SAVE_VARIABLE VARIABLE=cfs_active_unit VALUE={unit}
    SAVE_VARIABLE VARIABLE=cfs_active_slot VALUE={slot}

[gcode_macro CFS_UNLOAD]
description: Unload the active CFS slot
gcode:
    RESPOND MSG="CFS: unloading"
    # ---- your CFS unload sequence here ----
    SAVE_VARIABLE VARIABLE=cfs_active_unit VALUE=-1
    SAVE_VARIABLE VARIABLE=cfs_active_slot VALUE=-1

[gcode_macro CFS_LOAD_EXTERNAL]
description: Load the external spool (direct spool-holder feed, NOT a CFS box)
variable_load_temp: 220        # min hotend temp before extruding
variable_load_length: 90       # mm to feed (tune to your PTFE path to the nozzle)
gcode:
    {% set t = [printer.extruder.target, load_temp|int]|max %}
    RESPOND MSG="External: heating to {t}C then loading"
    M104 S{t}
    M109 S{t}                  # wait for hotend
    M83                        # relative extrusion
    G1 E{load_length|int} F300 # feed to the nozzle
    G1 E20 F150                # slow purge
    SAVE_VARIABLE VARIABLE=cfs_active_unit VALUE=0
    SAVE_VARIABLE VARIABLE=cfs_active_slot VALUE=1
    RESPOND MSG="External spool loaded"

[gcode_macro CFS_UNLOAD_EXTERNAL]
description: Unload the external spool
variable_unload_temp: 220
variable_unload_length: 95     # mm to retract clear of the cold zone
gcode:
    {% set t = [printer.extruder.target, unload_temp|int]|max %}
    RESPOND MSG="External: heating to {t}C then unloading"
    M104 S{t}
    M109 S{t}
    M83
    G1 E5 F150                 # small purge to soften the tip
    G1 E-{unload_length|int} F300
    SAVE_VARIABLE VARIABLE=cfs_active_unit VALUE=-1
    SAVE_VARIABLE VARIABLE=cfs_active_slot VALUE=-1
    RESPOND MSG="External spool unloaded"

[gcode_macro FILAMENT_CUT_CALIBRATION]
description: Calibrate the filament cutter
gcode:
    RESPOND MSG="Filament cut calibration. Wire to the box.py cutter routine"
    # TODO: ram filament into the cutter switch_pin and confirm via box.py cut_state.
    # Tied to the unfinished cutter work in box.py. Coordinate before enabling.

# ------------------------------------------------------------
#  Maintenance wrappers the StoneLabs UI buttons call. These exist
#  so the buttons don't throw "Unknown command" - fill the bodies
#  to match THIS machine (printer.cfg line refs noted).
# ------------------------------------------------------------
[gcode_macro CLEAN_NOZZLE]
description: Clean the nozzle (UI: Maintenance -> Clean nozzle)
variable_clean_temp: 240
gcode:
    {% if 'xyz' not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    M104 S{clean_temp|int}
    M109 S{clean_temp|int}
    BOX_NOZZLE_CLEAN           # simplest: use box.py's routine (recommended)
    # --- OR a wipe using the [box] clean positions instead of the line above: ---
    #   G90
    #   G1 Z5 F600
    #   G1 X0  F6000     ; [box] clean_left_pos_x: 0
    #   G1 X-5 F2000     ; [box] clean_right_pos_x: -5   (repeat a few times)
    RESPOND MSG="Nozzle clean done"

[gcode_macro PROBE_CALIBRATE]
description: Z offset / nozzle-to-bed reference (UI: Maintenance -> Z calibrate)
gcode:
    # This machine uses [prtouch_v3] (printer.cfg:146), NOT [probe], so the stock
    # PROBE_CALIBRATE doesn't exist. Point this at the real prtouch Z-offset
    # routine. The real bed-level/probe entry on this printer is G29 (printer.cfg:467).
    RESPOND MSG="Z calibrate. Wire to your prtouch_v3 Z-offset command"
    # Uncomment the correct one for your setup:
    #   G29                     ; full prtouch bed-level entry on this printer
    #   PRTOUCH_PROBE_ZOFFSET   ; if your prtouch_v3 exposes a z-offset command


# === Demo seed: run once to see the panel populated ===========
# Sets 2 boxes online with sample spools so the panel renders
# fully before your real detection logic is wired. Delete later.
[gcode_macro CFS_DEMO_SEED]
